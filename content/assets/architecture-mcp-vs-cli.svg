<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">MCP vs CLI Architecture Flow</title>
  <desc id="desc">Comparison of inline MCP responses and on-demand CLI responses.</desc>
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#0f172a">MCP vs CLI: Data Delivery Flow</text>

  <rect x="70" y="90" width="490" height="560" rx="16" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="315" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">MCP (Inline)</text>

  <rect x="640" y="90" width="490" height="560" rx="16" fill="#dcfce7" stroke="#bbf7d0"/>
  <text x="885" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#14532d">CLI (On-Demand)</text>

  <rect x="110" y="170" width="180" height="80" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">LLM Agent</text>

  <rect x="340" y="170" width="180" height="80" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="430" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">MCP Server</text>

  <rect x="110" y="320" width="410" height="120" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="315" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">Response to LLM includes:</text>
  <text x="315" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">full page snapshot + dropdown options</text>
  <text x="315" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">+ logs + action metadata</text>

  <line x1="290" y1="210" x2="340" y2="210" stroke="#334155" stroke-width="3"/>
  <polygon points="340,210 330,204 330,216" fill="#334155"/>
  <line x1="340" y1="230" x2="290" y2="230" stroke="#334155" stroke-width="3"/>
  <polygon points="290,230 300,224 300,236" fill="#334155"/>

  <line x1="430" y1="250" x2="430" y2="320" stroke="#334155" stroke-width="3"/>
  <polygon points="430,320 424,310 436,310" fill="#334155"/>

  <text x="315" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#7f1d1d">~3,075 tokens</text>

  <rect x="680" y="170" width="180" height="80" rx="10" fill="#ffffff" stroke="#22c55e"/>
  <text x="770" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#14532d">LLM Agent</text>

  <rect x="910" y="170" width="180" height="80" rx="10" fill="#ffffff" stroke="#22c55e"/>
  <text x="1000" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#14532d">CLI Layer</text>

  <rect x="680" y="320" width="410" height="120" rx="10" fill="#ffffff" stroke="#22c55e"/>
  <text x="885" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#14532d">Response to LLM includes:</text>
  <text x="885" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">status + targeted values + file path</text>
  <text x="885" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">snapshot loaded only if requested</text>

  <line x1="860" y1="210" x2="910" y2="210" stroke="#166534" stroke-width="3"/>
  <polygon points="910,210 900,204 900,216" fill="#166534"/>
  <line x1="910" y1="230" x2="860" y2="230" stroke="#166534" stroke-width="3"/>
  <polygon points="860,230 870,224 870,236" fill="#166534"/>

  <line x1="1000" y1="250" x2="1000" y2="320" stroke="#166534" stroke-width="3"/>
  <polygon points="1000,320 994,310 1006,310" fill="#166534"/>

  <text x="885" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#166534">~800 tokens</text>
</svg>
