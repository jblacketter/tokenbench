<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Token Breakdown by Approach</title>
  <desc id="desc">Stacked bars comparing input and output token totals for MCP and CLI approaches.</desc>
  <rect width="1100" height="640" fill="#f8fafc"/>
  <text x="550" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#0f172a">Token Breakdown</text>
  <text x="550" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">Input tokens are similar. Output tokens drive the gap.</text>

  <line x1="160" y1="540" x2="980" y2="540" stroke="#64748b" stroke-width="2"/>
  <line x1="160" y1="140" x2="160" y2="540" stroke="#64748b" stroke-width="2"/>

  <text x="130" y="545" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">0</text>
  <text x="130" y="465" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">640</text>
  <text x="130" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">1280</text>
  <text x="130" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">1920</text>
  <text x="130" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">2560</text>
  <text x="130" y="145" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">3200</text>

  <!-- MCP bar: input ~150, output ~2925 (scale max 3200) -->
  <rect x="300" y="521" width="170" height="19" fill="#94a3b8"/>
  <rect x="300" y="156" width="170" height="365" fill="#ef4444"/>
  <text x="385" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">MCP</text>
  <text x="385" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7f1d1d">~3,075 total</text>

  <!-- CLI bar: input ~125, output ~675 -->
  <rect x="650" y="524" width="170" height="16" fill="#94a3b8"/>
  <rect x="650" y="440" width="170" height="84" fill="#22c55e"/>
  <text x="735" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">CLI</text>
  <text x="735" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">~800 total</text>

  <rect x="200" y="595" width="18" height="18" fill="#94a3b8"/>
  <text x="228" y="609" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">Input tokens</text>
  <rect x="360" y="595" width="18" height="18" fill="#ef4444"/>
  <text x="388" y="609" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">MCP output tokens</text>
  <rect x="580" y="595" width="18" height="18" fill="#22c55e"/>
  <text x="608" y="609" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">CLI output tokens</text>
</svg>
