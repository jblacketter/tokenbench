<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TokenBench Demo Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    nav {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 18px;
      background: #0f172a;
      color: #f8fafc;
    }
    nav button,
    nav a,
    .btn {
      border: 1px solid #94a3b8;
      background: #1e293b;
      color: #f8fafc;
      border-radius: 6px;
      padding: 6px 10px;
      text-decoration: none;
      cursor: pointer;
    }
    main {
      max-width: 980px;
      margin: 20px auto;
      padding: 0 16px 28px;
    }
    section {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
    }
    #priorities-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(15, 23, 42, 0.45);
    }
    #priorities-modal .panel {
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      width: min(520px, 92vw);
      padding: 14px 16px;
    }
    #priorities-modal[data-open="true"] {
      display: grid;
    }
  </style>
</head>
<body>
  <nav aria-label="Primary">
    <button data-testid="nav-create-writeup-btn" type="button">Create Writeup</button>
    <button data-testid="nav-user-menu-btn" type="button">User Menu</button>
    <a data-testid="nav-logout-link" href="#logout">Logout</a>
  </nav>

  <main>
    <section data-testid="new-deal-customer-section" aria-label="Customer Information">
      <h2>Customer</h2>
      <div class="grid">
        <div>
          <label for="first-name">First Name</label>
          <input id="first-name" data-testid="new-deal-first-name-input" name="first_name" type="text">
        </div>
        <div>
          <label for="middle-name">Middle Name</label>
          <input id="middle-name" data-testid="new-deal-middle-name-input" name="middle_name" type="text">
        </div>
        <div>
          <label for="last-name">Last Name</label>
          <input id="last-name" data-testid="new-deal-last-name-input" name="last_name" type="text">
        </div>
        <div>
          <label for="company-name">Company Name</label>
          <input id="company-name" data-testid="new-deal-company-name-input" name="company_name" type="text">
        </div>
        <div>
          <label for="street">Street</label>
          <input id="street" data-testid="new-deal-street-input" name="street" type="text">
        </div>
        <div>
          <label for="city">City</label>
          <input id="city" data-testid="new-deal-city-input" name="city" type="text">
        </div>
        <div>
          <label for="state">State</label>
          <select id="state" data-testid="new-deal-state-select" name="state">
            <option selected>Select State</option>
            <option>Alabama</option>
            <option>Alaska</option>
            <option>Arizona</option>
            <option>Arkansas</option>
            <option>California</option>
            <option>Colorado</option>
            <option>Connecticut</option>
            <option>Delaware</option>
            <option>Florida</option>
            <option>Georgia</option>
            <option>Hawaii</option>
            <option>Idaho</option>
            <option>Illinois</option>
            <option>Indiana</option>
            <option>Iowa</option>
            <option>Kansas</option>
            <option>Kentucky</option>
            <option>Louisiana</option>
            <option>Maine</option>
            <option>Maryland</option>
            <option>Massachusetts</option>
            <option>Michigan</option>
            <option>Minnesota</option>
            <option>Mississippi</option>
            <option>Missouri</option>
            <option>Montana</option>
            <option>Nebraska</option>
            <option>Nevada</option>
            <option>New Hampshire</option>
            <option>New Jersey</option>
            <option>New Mexico</option>
            <option>New York</option>
            <option>North Carolina</option>
            <option>North Dakota</option>
            <option>Ohio</option>
            <option>Oklahoma</option>
            <option>Oregon</option>
            <option>Pennsylvania</option>
            <option>Rhode Island</option>
            <option>South Carolina</option>
            <option>South Dakota</option>
            <option>Tennessee</option>
            <option>Texas</option>
            <option>Utah</option>
            <option>Vermont</option>
            <option>Virginia</option>
            <option>Washington</option>
            <option>West Virginia</option>
            <option>Wisconsin</option>
            <option>Wyoming</option>
          </select>
        </div>
        <div>
          <label for="county-input">County (manual)</label>
          <input id="county-input" data-testid="new-deal-county-input" name="county_input" type="text">
        </div>
        <div>
          <label for="county-select">County (select)</label>
          <select id="county-select" data-testid="new-deal-county-select" name="county_select">
            <option selected>Select County</option>
            <option>Multnomah</option>
            <option>King</option>
            <option>Los Angeles</option>
          </select>
        </div>
        <div>
          <label for="zip">ZIP</label>
          <input id="zip" data-testid="new-deal-zip-input" name="zip" type="text">
        </div>
        <div>
          <label for="phone">Phone</label>
          <input id="phone" data-testid="new-deal-phone-input" name="phone" type="tel">
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" data-testid="new-deal-email-input" name="email" type="email">
        </div>
      </div>
    </section>

    <section data-testid="new-deal-vehicle-section" aria-label="Vehicle Information">
      <h2>Vehicle</h2>
      <div class="grid">
        <div>
          <button class="btn" data-testid="new-deal-vehicle-lookup-btn" type="button">Lookup VIN</button>
        </div>
        <div>
          <label for="stock-number">Stock Number</label>
          <input id="stock-number" data-testid="new-deal-stock-number-input" name="stock_number" type="text">
        </div>
        <div>
          <label for="odometer">Odometer</label>
          <input id="odometer" data-testid="new-deal-odometer-input" name="odometer" type="number">
        </div>
        <div>
          <label for="plate-number">Plate Number</label>
          <input id="plate-number" data-testid="new-deal-plate-number-input" name="plate_number" type="text">
        </div>
        <div>
          <label for="plate-expires">Plate Expires</label>
          <input id="plate-expires" data-testid="new-deal-plate-expires-input" name="plate_expires" type="date">
        </div>
        <div>
          <label for="sales-id">Sales ID</label>
          <input id="sales-id" data-testid="new-deal-sales-id-input" name="sales_id" type="text">
        </div>
      </div>
      <p>
        <button class="btn" data-testid="new-deal-continue-btn" type="button">Continue</button>
      </p>
    </section>
  </main>

  <div id="priorities-modal" data-open="false" role="dialog" aria-label="Customer Priorities">
    <div class="panel">
      <h3>Customer Priorities</h3>
      <p>This modal opens automatically to mimic production complexity.</p>
    </div>
  </div>

  <script>
    window.addEventListener("load", function () {
      var modal = document.getElementById("priorities-modal");
      modal.setAttribute("data-open", "true");
    });
  </script>
</body>
</html>
